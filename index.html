function getDday(startDate) {
  const now = new Date();
  const diff = Math.ceil((startDate - now) / (1000 * 60 * 60 * 24));
  return diff;
}

function MapPill({ query }) {
  if (!query) return null;
  return (
    <a href={mapUrl(query)} target="_blank" rel="noopener noreferrer" className="map-pill" onClick={(e) => e.stopPropagation()}>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      Map
    </a>
  );
}

// 날짜 네비 - 컴팩트 한 줄 칩 (2026 미니멀)
function DateNav({ schedule, onSelect, currentIdx }) {
  const [expanded, setExpanded] = useState(false);
  const TODAY = "5/27"; // 오늘 날짜
  // 도시별 색 구분 - 블루톤 그라데이션
  const cityColor = (city) => {
    if (city.includes('Barcelona')) return '#7eb8d8';   // 라이트블루
    if (city.includes('Granada')) return '#5b8db8';     // 미디엄블루
    if (city.includes('Sevilla') || city.includes('Cádiz')) return '#f49a8a'; // 코랄 (안달루시아 따뜻함)
    if (city.includes('Porto')) return '#2a5b85';       // 딥블루
    if (city.includes('Lisboa')) return '#1e3a5f';      // 네이비
    return '#8896a8';
  };
  const cityShort = (city) => {
    if (city.includes('Barcelona')) return 'BCN';
    if (city.includes('Granada')) return 'GRX';
    if (city.includes('Sevilla') || city.includes('Cádiz')) return 'SVQ';
    if (city.includes('Porto')) return 'OPO';
    if (city.includes('Lisboa')) return 'LIS';
    return city;
  };

  const scrollRef = React.useRef(null);
  React.useEffect(() => {
    if (scrollRef.current && !expanded) {
      const activeEl = scrollRef.current.querySelector('[data-active="true"]');
      if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  }, [currentIdx, expanded]);

  return (
    <div style={{
      background: C.white,
      borderBottom: `1px solid ${C.line}`
    }}>
      {/* 상단 라벨 + 토글 */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 16px 6px' }}>
        <span style={{ fontSize: '11px', color: C.inkMid, fontWeight: 600, letterSpacing: '-0.01em' }}>
          {schedule[currentIdx] && (
            <span style={{ color: cityColor(schedule[currentIdx].city) }}>● </span>
          )}
          {schedule[currentIdx] ? `${schedule[currentIdx].date} ${schedule[currentIdx].day} · ${cityShort(schedule[currentIdx].city)}` : '선택'}
        </span>
        <button onClick={() => setExpanded(!expanded)} style={{
          background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'inherit',
          fontSize: '11px', color: C.leafDeep, fontWeight: 600, display: 'flex', alignItems: 'center', gap: '3px', padding: 0
        }}>
          {expanded ? '접기' : '전체'}
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ transform: expanded ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.2s' }}>
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>

      {!expanded ? (
        // 가로 스크롤 - 한 줄 컴팩트 칩
        <div ref={scrollRef} style={{
          display: 'flex', gap: '6px', overflowX: 'auto', padding: '4px 16px 12px',
          scrollbarWidth: 'none'
        }}>
          {schedule.map((day, i) => {
            const isToday = day.date === TODAY;
            const isActive = currentIdx === i;
            const cColor = cityColor(day.city);
            return (
              <button
                key={i}
                data-active={isActive}
                onClick={() => onSelect(i)}
                style={{
                  flexShrink: 0, padding: '6px 10px',
                  background: isActive ? C.leafDeep : isToday ? C.coralLight : C.paper,
                  color: isActive ? C.white : isToday ? '#c2553f' : C.ink,
                  border: 'none',
                  borderRadius: '999px', cursor: 'pointer', fontFamily: 'inherit',
                  transition: 'all 0.15s', display: 'flex', alignItems: 'center', gap: '5px',
                  fontSize: '12px', fontWeight: isActive || isToday ? 700 : 500,
                  letterSpacing: '-0.01em',
                  boxShadow: isActive ? '0 2px 8px rgba(30, 58, 95, 0.18)' : 'none'
                }}
              >
                <span style={{
                  width: '5px', height: '5px', borderRadius: '50%',
                  background: isActive ? C.white : cColor,
                  flexShrink: 0
                }}></span>
                <span>{day.date}</span>
                {isToday && <span style={{ fontSize: '9px', opacity: 0.8, fontWeight: 700 }}>·오늘</span>}
              </button>
            );
          })}
        </div>
      ) : (
        // 전체 달력 - 깔끔한 5열 그리드 (작게)
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '5px', padding: '4px 16px 12px' }}>
          {schedule.map((day, i) => {
            const isToday = day.date === TODAY;
            const isActive = currentIdx === i;
            const cColor = cityColor(day.city);
            return (
              <button
                key={i}
                onClick={() => { onSelect(i); setExpanded(false); }}
                style={{
                  padding: '6px 2px',
                  background: isActive ? C.leafDeep : isToday ? C.coralLight : C.paper,
                  color: isActive ? C.white : isToday ? '#c2553f' : C.ink,
                  border: 'none',
                  borderRadius: '10px', cursor: 'pointer', fontFamily: 'inherit',
                  transition: 'all 0.15s', position: 'relative', overflow: 'hidden',
                  boxShadow: isActive ? '0 2px 8px rgba(30, 58, 95, 0.18)' : 'none'
                }}
              >
                <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '2px', background: cColor }}></div>
                <div style={{ fontSize: '8px', opacity: isActive ? 0.75 : 0.5, fontWeight: 600, textTransform: 'uppercase', marginTop: '2px', letterSpacing: '0.5px' }}>
                  {day.day}
                </div>
                <div style={{ fontSize: '12px', fontWeight: 700, letterSpacing: '-0.02em', marginTop: '1px' }}>
                  {day.date}
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

  const [currentIdx, setCurrentIdx] = useState(todayIdx >= 0 ? todayIdx : null);
  const [outfitDate, setOutfitDate] = useState(null);
  const handleSelect = (idx) => {
    setOpenIdx(idx);
    setCurrentIdx(idx);
    setTimeout(() => {
      const el = document.getElementById(`day-${idx}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  };
  // 앱 열면 오늘 카드로 부드럽게 점프
  React.useEffect(() => {
    if (todayIdx >= 0) {
      setTimeout(() => {
        const el = document.getElementById(`day-${todayIdx}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 300);
    }
  }, []);
  return (
    <div>
      <div style={{ position: 'sticky', top: '54px', zIndex: 90 }}>
        <DateNav schedule={SCHEDULE} onSelect={handleSelect} currentIdx={currentIdx} />
      </div>
      <div style={{ padding: '18px 16px' }}>
        {SCHEDULE.map((day, i) => (
          <ScheduleCard key={i} day={day} index={i} isOpen={openIdx === i} onToggle={() => {
            setOpenIdx(openIdx === i ? null : i);
            setCurrentIdx(i);
          }} onShowOutfit={(date) => setOutfitDate(date)} />
        ))}
      </div>
      {/* 오늘로 가기 플로팅 버튼 */}
      {todayIdx >= 0 && (
        <button
          onClick={() => handleSelect(todayIdx)}
          style={{
            position: 'fixed', bottom: '78px', right: '16px', zIndex: 95,
            background: C.coral, color: '#fff', border: 'none',
            borderRadius: '24px', padding: '11px 16px', cursor: 'pointer',
            fontFamily: 'inherit', fontSize: '12.5px', fontWeight: 700,
            boxShadow: '0 4px 16px rgba(244, 168, 150, 0.5)',
            display: 'flex', alignItems: 'center', gap: '6px'
          }}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          오늘 ({TODAY})
        </button>
      )}
      {outfitDate && (
        <OutfitModal
          outfits={getOutfitsByDate(outfitDate)}
          dateLabel={outfitDate.split(' ')[0]}
          onClose={() => setOutfitDate(null)}
        />
      )}
    </div>
  );
}

          <div style={{ flexShrink: 0, width: '44px', display: 'flex', flexDirection: 'column', gap: '3px' }}>
            <div style={{ height: '28px', background: o.topColor, borderRadius: '7px 7px 3px 3px', border: '1px solid rgba(0,0,0,0.06)' }}></div>
            <div style={{ height: '33px', background: o.bottomColor, borderRadius: '3px 3px 7px 7px', border: '1px solid rgba(0,0,0,0.06)' }}></div>
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: '7px', marginBottom: '3px', flexWrap: 'wrap' }}>
              <span className="mono" style={{ fontSize: '10.5px', color: C.leaf, fontWeight: 700, letterSpacing: '1px' }}>№{String(o.num).padStart(2, '0')}</span>
              <span style={{ fontSize: '13px', fontWeight: 600, color: C.ink }}>{o.date}</span>
              <span className="mono" style={{ fontSize: '9.5px', color: C.inkLight, letterSpacing: '1px' }}>{o.day}</span>
              {o.highlight && <span style={{ fontSize: '8.5px', color: C.coral, background: C.coralLight, padding: '2px 6px', borderRadius: '5px', fontWeight: 700, letterSpacing: '0.5px', marginLeft: 'auto' }}>SNAP</span>}
            </div>
            <div style={{ fontSize: '12.5px', color: C.ink, marginBottom: '2px', lineHeight: 1.4 }}>{o.desc}</div>
            <div style={{ fontSize: '10.5px', color: o.highlight ? C.coral : C.inkLight, fontWeight: o.highlight ? 600 : 400 }}>{o.note}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('schedule');
  return (
    <div style={{ background: C.cream, minHeight: '100vh', paddingTop: '54px' }}>
      <TabBar tab={tab} setTab={setTab} />
      <Header />
      <div>
        {tab === 'schedule' && <SchedulePage />}
        {tab === 'reservations' && <ReservationsPage />}
        {tab === 'guide' && <GuidePage />}
        {tab === 'outfits' && <OutfitsPage />}
      </div>
      <div className="glass" style={{
        position: 'fixed',
        bottom: 0,
        left: 0,
        right: 0,
        padding: '12px 16px 16px',
        background: 'rgba(250, 255, 254, 0.92)',
        textAlign: 'center',
        borderTop: `1px solid ${C.line}`
      }}>
        <div className="display" style={{ fontSize: '13.5px', color: C.leafDeep, fontStyle: 'italic', fontWeight: 400 }}>
          forever begins ✦
        </div>
        <div className="mono" style={{ fontSize: '9px', color: C.inkLight, letterSpacing: '3px', marginTop: '1px', fontWeight: 500 }}>
          MAY 15 — JUN 1, 2026
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
