function getDday(startDate) {
  const now = new Date();
  const diff = Math.ceil((startDate - now) / (1000 * 60 * 60 * 24));
  return diff;
}

function MapPill({ query }) {
  if (!query) return null;
  return (
    <a href={mapUrl(query)} target="_blank" rel="noopener noreferrer" className="map-pill" onClick={(e) => e.stopPropagation()}>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">

        <circle cx="12" cy="10" r="3"/>
      </svg>
      Map
    </a>
  );
}

function SchedulePage() {
  const [openIdx, setOpenIdx] = useState(null);
  const [currentIdx, setCurrentIdx] = useState(null);
  const handleSelect = (idx) => {
    setOpenIdx(idx);
    setCurrentIdx(idx);
    setTimeout(() => {
      const el = document.getElementById(`day-${idx}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  };
  return (
    <div>
      <div style={{ position: 'sticky', top: '50px', zIndex: 90 }}>
        <DateNav schedule={SCHEDULE} onSelect={handleSelect} currentIdx={currentIdx} />
      </div>
      <div style={{ padding: '20px 16px' }}>
        {SCHEDULE.map((day, i) => (
          <ScheduleCard key={i} day={day} index={i} isOpen={openIdx === i} onToggle={() => {
            setOpenIdx(openIdx === i ? null : i);
            setCurrentIdx(i);
          }} />
        ))}
      </div>
    </div>
  );
}

                fontWeight: 500,
                display: 'inline-block',
                width: 'fit-content'
              }}>
                ✓ {h.note}
              </div>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

        <div style={{ position: 'relative' }}>

          </div>
        </div>
      </div>

      {OUTFITS.map((o, i) => (
        <div key={i} style={{
          background: o.highlight

          padding: '14px',

              border: '1px solid rgba(0,0,0,0.06)'

            <div style={{
              height: '36px',
              background: o.bottomColor,

              border: '1px solid rgba(0,0,0,0.06)'

          </div>

          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: '8px', marginBottom: '4px', flexWrap: 'wrap' }}>
              <span className="mono" style={{
                fontSize: '11px',
                color: C.sage,
                fontWeight: 700,
                letterSpacing: '1px'
              }}>
                №{String(o.num).padStart(2, '0')}
              </span>
              <span style={{
                fontSize: '14px',
                fontWeight: 600,
                color: C.ink,
                letterSpacing: '-0.01em'

              <span className="mono" style={{ fontSize: '10px', color: C.inkLight, letterSpacing: '1px' }}>

              fontSize: '11px',

function App() {
  const [tab, setTab] = useState('schedule');
  return (
    <div style={{ background: C.cream, minHeight: '100vh' }}>
      <Header tab={tab} setTab={setTab} />
      <div>
        {tab === 'schedule' && <SchedulePage />}
        {tab === 'reservations' && <ReservationsPage />}
        {tab === 'outfits' && <OutfitsPage />}
      </div>
      <div className="glass" style={{
        position: 'fixed',
        bottom: 0,
        left: 0,
        right: 0,
        padding: '14px 16px 18px',
