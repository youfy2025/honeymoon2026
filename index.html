function getDday(startDate) {
  const now = new Date();
  const diff = Math.ceil((startDate - now) / (1000 * 60 * 60 * 24));
  return diff;
}

function MapPill({ query }) {
  if (!query) return null;
  return (
    <a href={mapUrl(query)} target="_blank" rel="noopener noreferrer" className="map-pill" onClick={(e) => e.stopPropagation()}>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      Map
    </a>
  );
}

              <div className="mono" style={{ fontSize: '18px', fontWeight: 700, color: C.ink, letterSpacing: '-0.02em' }}>{f.from}</div>

            <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: '5px' }}>
              <div style={{ flex: 1, height: '1px', background: C.lineDeep }}></div>
              <svg width="12" height="12" viewBox="0 0 24 24" fill={C.leaf}>
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" transform="rotate(45 12 12)"/>
              </svg>
              <div style={{ flex: 1, height: '1px', background: C.lineDeep }}></div>
            </div>
            <div style={{ textAlign: 'right' }}>

              <div style={{ fontSize: '9.5px', color: C.inkLight, marginTop: '1px' }}>{f.toKr}</div>
            </div>
          </div>
          {f.map && <div style={{ marginBottom: '8px' }}><MapPill query={f.map} /></div>}
          <div style={{ fontSize: '11.5px', color: C.inkMid, paddingTop: '8px', borderTop: `1px solid ${C.line}` }}>
            <div>{f.time}</div>
            {f.code !== '—' && <div className="mono" style={{ fontSize: '10.5px', color: C.inkLight, marginTop: '2px' }}>{f.airline} · {f.code}</div>}
            <div style={{ fontSize: '10.5px', color: C.inkLight, marginTop: '2px' }}>{f.note}</div>
          </div>
        </div>
      ))}

      <SectionHeader label="Tours" count={`${RESERVATIONS.length} experiences`} />
      {RESERVATIONS.map((r, i) => {
        const tc = typeColors[r.type] || typeColors["TOUR"];
        return (
          <div key={i} style={{
            background: r.highlight ? `linear-gradient(135deg, ${C.white} 0%, ${C.coralLight}30 100%)` : C.white,
            borderRadius: '16px',
            padding: '16px',
            marginBottom: '10px',
            border: r.highlight ? `1.5px solid ${C.coral}` : `1px solid ${C.line}`,
            boxShadow: r.highlight ? `0 4px 12px ${C.coralLight}70` : 'none'
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
              <span style={{ background: tc.bg, color: tc.color, padding: '3px 9px', borderRadius: '7px', fontSize: '10px', fontWeight: 700, letterSpacing: '1px' }}>{r.type}</span>
              <span className="mono" style={{ fontSize: '11.5px', color: C.inkMid, fontWeight: 500 }}>{r.date}</span>
              {r.price && <span className="mono" style={{ marginLeft: 'auto', fontSize: '11.5px', color: C.leafDeep, fontWeight: 700 }}>{r.price}</span>}
              {r.highlight && !r.price && <span style={{ marginLeft: 'auto', fontSize: '11px', color: C.coral, fontWeight: 600 }}>✦</span>}
            </div>
            <div style={{ fontSize: '14.5px', fontWeight: 600, marginBottom: '10px', color: C.ink, lineHeight: 1.35 }}>{r.title}</div>
            <div style={{ display: 'grid', gap: '4px', fontSize: '11.5px', color: C.inkMid, paddingTop: '8px', borderTop: `1px solid ${C.line}` }}>
              <div style={{ display: 'flex', gap: '8px' }}>
                <span style={{ color: C.inkLight, fontSize: '10px', minWidth: '42px', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: 600 }}>Time</span>
                <span>{r.time}</span>
              </div>
              <div style={{ display: 'flex', gap: '8px' }}>
                <span style={{ color: C.inkLight, fontSize: '10px', minWidth: '42px', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: 600 }}>업체</span>
                <span>{r.company}</span>
              </div>
              <div style={{ display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' }}>
                <span style={{ color: C.inkLight, fontSize: '10px', minWidth: '42px', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: 600 }}>Meet</span>
                <span>{r.meet}</span>
                {r.map && <MapPill query={r.map} />}
              </div>
              <div style={{ display: 'flex', gap: '8px' }}>
                <span style={{ color: C.coral, fontSize: '10px', minWidth: '42px', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: 700 }}>준비</span>
                <span style={{ color: '#8a3a28', fontWeight: 500 }}>{r.item}</span>
              </div>
            </div>
          </div>
        );
      })}

      <SectionHeader label="Stays" count={`${HOTELS.length} hotels`} />
      {HOTELS.map((h, i) => (
        <div key={i} style={{ background: C.white, borderRadius: '16px', padding: '16px', marginBottom: '10px', border: `1px solid ${C.line}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '10px' }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '5px', flexWrap: 'wrap' }}>
                <span className="mono" style={{ fontSize: '10px', color: C.leafDeep, fontWeight: 700, letterSpacing: '2px', textTransform: 'uppercase' }}>{h.city}</span>
                <span style={{ background: h.type === 'Hotel' ? C.lakeLight : C.leafLight, color: h.type === 'Hotel' ? C.lakeDeep : C.leafDeep, padding: '2px 7px', borderRadius: '5px', fontSize: '9.5px', fontWeight: 600 }}>{h.type}</span>
                <span className="mono" style={{ fontSize: '9.5px', color: C.inkLight, fontWeight: 500 }}>{h.nights}</span>
              </div>
              <div style={{ fontSize: '15px', fontWeight: 600, color: C.ink, marginBottom: '3px', display: 'flex', alignItems: 'center', gap: '7px', flexWrap: 'wrap' }}>
                <span>{h.name}</span>
                {h.map && <MapPill query={h.map} />}
              </div>
            </div>
            <div className="mono" style={{ fontSize: '10px', color: C.inkMid, textAlign: 'right', flexShrink: 0, marginLeft: '6px', fontWeight: 500 }}>{h.date}</div>
          </div>
          <div style={{ display: 'grid', gap: '4px', fontSize: '11.5px', color: C.inkMid, paddingTop: '8px', borderTop: `1px solid ${C.line}` }}>
            <div style={{ display: 'flex', gap: '8px' }}>
              <span style={{ color: C.inkLight, fontSize: '10px', minWidth: '46px', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: 600 }}>체크인</span>
              <span>{h.checkin}</span>
            </div>
            {h.ref !== '-' && (
              <div style={{ display: 'flex', gap: '8px' }}>
                <span style={{ color: C.inkLight, fontSize: '10px', minWidth: '46px', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: 600 }}>Ref</span>
                <span className="mono" style={{ fontSize: '10.5px' }}>{h.ref}</span>
              </div>
            )}
            <div style={{ display: 'flex', gap: '8px' }}>
              <span style={{ color: C.inkLight, fontSize: '10px', minWidth: '46px', textTransform: 'uppercase', letterSpacing: '1px', fontWeight: 600 }}>주소</span>
              <span style={{ fontSize: '11px' }}>{h.address}</span>
            </div>
            {h.note && (
              <div style={{ marginTop: '4px', padding: '5px 9px', background: C.leafLight, borderRadius: '7px', fontSize: '11px', color: C.leafDeep, fontWeight: 500, display: 'inline-block', width: 'fit-content' }}>
                ✓ {h.note}
              </div>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

// ============ LOCAL GUIDE 페이지 ============
function GuideCard({ guide }) {
  const [openSection, setOpenSection] = useState(null);

  const sections = [
    { id: 'trendy', label: '2026 핫플', icon: '🔥', data: guide.trendy2026, isText: true },
    { id: 'food', label: 'Must Eat', icon: '🍽', data: guide.food },
    { id: 'snack', label: '간식·디저트', icon: '🍩', data: guide.snack },
    { id: 'souvenir', label: '기념품', icon: '🎁', data: guide.souvenir }
  ];

  return (
    <div style={{
      background: C.white,
      borderRadius: '20px',
      padding: '20px',
      marginBottom: '14px',
      border: `1px solid ${C.line}`,
      boxShadow: '0 2px 8px rgba(31, 46, 42, 0.04)'
    }}>
      {/* 도시 헤더 */}
      <div style={{
        padding: '14px 16px',
        marginBottom: '14px',
        marginLeft: '-20px',
        marginRight: '-20px',
        marginTop: '-20px',
        background: `linear-gradient(135deg, ${C.leafLight} 0%, ${C.lakeLight} 100%)`,
        borderRadius: '20px 20px 0 0',
        position: 'relative',
        overflow: 'hidden'
      }}>
        <div style={{ position: 'absolute', top: '-30px', right: '-30px', width: '90px', height: '90px', borderRadius: '50%', background: 'rgba(255,255,255,0.4)' }}></div>
        <div style={{ position: 'relative', display: 'flex', alignItems: 'center', gap: '12px' }}>
          <div style={{ fontSize: '32px' }}>{guide.emoji}</div>
          <div style={{ flex: 1 }}>
            <div className="display" style={{ fontSize: '24px', color: C.leafDeep, lineHeight: 1, marginBottom: '2px' }}>
              {guide.cityKor}
            </div>
            <div className="mono" style={{ fontSize: '9.5px', color: C.leafDeep, opacity: 0.6, letterSpacing: '2px', fontWeight: 600, marginBottom: '4px' }}>
              {guide.city}
            </div>
            <div style={{ fontSize: '11.5px', color: C.leafDeep, opacity: 0.8, fontStyle: 'italic' }}>
              {guide.tagline}
            </div>
          </div>
        </div>
      </div>

      {/* 섹션들 */}
      {sections.map(section => (
        <div key={section.id} style={{ marginBottom: '10px' }}>
          <button
            onClick={() => setOpenSection(openSection === section.id ? null : section.id)}
            style={{
              width: '100%',
              padding: '10px 12px',
              background: openSection === section.id ? C.leafLight : C.paper,
              border: `1px solid ${C.line}`,
              borderRadius: '10px',
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'space-between',
              fontFamily: 'inherit',
              transition: 'all 0.2s'
            }}
          >
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
              <span style={{ fontSize: '15px' }}>{section.icon}</span>
              <span style={{ fontSize: '13px', fontWeight: 600, color: C.ink }}>{section.label}</span>
              <span className="mono" style={{ fontSize: '10px', color: C.inkLight, fontWeight: 500 }}>
                {section.data.length}
              </span>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.leaf} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ transform: openSection === section.id ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.2s' }}>
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

          {openSection === section.id && (
            <div className="fade-up" style={{ padding: '10px 4px 4px' }}>
              {section.isText ? (
                section.data.map((item, i) => (
                  <div key={i} style={{
                    fontSize: '13px',
                    color: C.ink,
                    padding: '6px 0',
                    paddingLeft: '14px',
                    position: 'relative',
                    lineHeight: 1.5
                  }}>
                    <span style={{ position: 'absolute', left: 0, top: '12px', width: '5px', height: '5px', borderRadius: '50%', background: C.sun }}></span>
                    {item}
                  </div>
                ))
              ) : (
                section.data.map((item, i) => (
                  <div key={i} style={{
                    padding: '10px 12px',
                    background: C.paper,
                    borderRadius: '10px',
                    marginBottom: '6px',
                    border: `1px solid ${C.line}`,
                    display: 'flex',
                    gap: '10px',
                    alignItems: 'flex-start'
                  }}>
                    {item.emoji && <span style={{ fontSize: '20px', flexShrink: 0 }}>{item.emoji}</span>}
                    <div style={{ flex: 1 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '2px' }}>
                        <span style={{ fontSize: '13px', fontWeight: 600, color: C.ink }}>{item.name}</span>
                        {item.trendy && (
                          <span style={{
                            fontSize: '8.5px',
                            color: C.sunDeep,
                            background: C.sunLight,
                            padding: '1.5px 5px',
                            borderRadius: '4px',
                            fontWeight: 700,
                            letterSpacing: '0.5px'
                          }}>
                            HOT 2026
                          </span>
                        )}
                      </div>
                      <div style={{ fontSize: '11.5px', color: C.inkMid, lineHeight: 1.4 }}>
                        {item.desc}
                      </div>
                    </div>
                  </div>
                ))
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function OutfitsPage() {

    <div style={{ padding: '18px 16px' }}>
      <div style={{
        background: `linear-gradient(135deg, ${C.coralLight} 0%, ${C.sunLight} 100%)`,
        padding: '20px',
        borderRadius: '18px',
        marginBottom: '16px',
        position: 'relative',

      }}>

function App() {

      <Header tab={tab} setTab={setTab} />

        {tab === 'schedule' && <SchedulePage />}
        {tab === 'reservations' && <ReservationsPage />}
        {tab === 'guide' && <GuidePage />}
        {tab === 'outfits' && <OutfitsPage />}
      </div>
      <div className="glass" style={{
        position: 'fixed',
        bottom: 0,
        left: 0,
        right: 0,
        padding: '12px 16px 16px',
        background: 'rgba(250, 255, 254, 0.92)',
        textAlign: 'center',
        borderTop: `1px solid ${C.line}`
      }}>
        <div className="display" style={{ fontSize: '13.5px', color: C.leafDeep, fontStyle: 'italic', fontWeight: 400 }}>

        <div className="mono" style={{ fontSize: '9px', color: C.inkLight, letterSpacing: '3px', marginTop: '1px', fontWeight: 500 }}>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
