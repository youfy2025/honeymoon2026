// 카운트다운 계산
function getDday(startDate) {
  const now = new Date();
  const diff = Math.ceil((startDate - now) / (1000 * 60 * 60 * 24));
  return diff;
}

// 장식용 SVG 컴포넌트
function Ornament({ size = 40, color = COLORS.gold, opacity = 0.5 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ opacity }}>
      <path d="M20 4 Q24 12 32 16 Q24 20 20 28 Q16 20 8 16 Q16 12 20 4 Z"
            fill={color} opacity="0.6" />
      <circle cx="20" cy="20" r="1.5" fill={color} />
    </svg>
  );
}

function Divider({ color = COLORS.gold }) {
  return (
    <div style={{
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      gap: '12px',
      margin: '8px 0 16px',
      opacity: 0.4
    }}>
      <div style={{ flex: 1, height: '1px', background: `linear-gradient(to right, transparent, ${color})` }}></div>
      <Ornament size={14} color={color} opacity={1} />
      <div style={{ flex: 1, height: '1px', background: `linear-gradient(to left, transparent, ${color})` }}></div>
    </div>
  );
}

function MapButton({ query }) {
  if (!query) return null;
  const handleClick = (e) => { e.stopPropagation(); };
  return (
    <a
      href={mapUrl(query)}
      target="_blank"
      rel="noopener noreferrer"
      className="map-btn"
      onClick={handleClick}
    >
      🗺️ 지도
    </a>
  );
}

function SchedulePage() {
  const [openIdx, setOpenIdx] = useState(null);
  const [currentIdx, setCurrentIdx] = useState(null);

  const handleSelect = (idx) => {
    setOpenIdx(idx);
    setCurrentIdx(idx);
    setTimeout(() => {
      const el = document.getElementById(`day-${idx}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  };

  return (
    <div>
      <div style={{ position: 'sticky', top: '52px', zIndex: 90 }}>
        <DateNav schedule={SCHEDULE} onSelect={handleSelect} currentIdx={currentIdx} />
      </div>
      <div style={{ padding: '20px 16px' }}>
        {SCHEDULE.map((day, i) => (
          <ScheduleCard
            key={i}
            day={day}
            index={i}
            isOpen={openIdx === i}
            onToggle={() => {
              setOpenIdx(openIdx === i ? null : i);
              setCurrentIdx(i);
            }}
          />
        ))}
      </div>
    </div>
  );
}
