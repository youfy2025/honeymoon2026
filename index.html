function SchedulePage() {
  const [openIdx, setOpenIdx] = useState(null);
  const [currentIdx, setCurrentIdx] = useState(null);

  const handleSelect = (idx) => {
    setOpenIdx(idx);
    setCurrentIdx(idx);
    setTimeout(() => {
      const el = document.getElementById(`day-${idx}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  };

  return (
    <div>
      <div style={{ position: 'sticky', top: '46px', zIndex: 90 }}>
        <DateNav schedule={SCHEDULE} onSelect={handleSelect} currentIdx={currentIdx} />
      </div>
      <div style={{ padding: '16px' }}>
        {SCHEDULE.map((day, i) => (
          <ScheduleCard
            key={i}
            day={day}
            index={i}
            isOpen={openIdx === i}
            onToggle={() => {
              setOpenIdx(openIdx === i ? null : i);
              setCurrentIdx(i);
            }}
          />
        ))}
      </div>
    </div>
  );
}

      }}>
        <div className="serif" style={{ fontSize: '18px', fontWeight: 600, marginBottom: '4px', color: '#1a1f3a' }}>
          데일리 코디 18
        </div>
        <div style={{ fontSize: '12px', color: '#5a4720' }}>
          매일 다른 룩 · 스냅 3회 강조
        </div>
      </div>

      {OUTFITS.map((o, i) => (
        <div key={i} style={{
          background: '#fff',
          borderRadius: '12px',
          padding: '14px',
          marginBottom: '10px',
          border: o.highlight ? '2px solid #7a1f2e' : '1px solid #efe9dd',
          display: 'flex',
          gap: '12px',
          alignItems: 'center'
        }}>
          <div style={{
            flexShrink: 0,
            width: '44px',
            display: 'flex',
            flexDirection: 'column',
            gap: '2px'
          }}>
            <div style={{
              height: '28px',
              background: o.topColor,
              borderRadius: '6px 6px 2px 2px',
              border: '1px solid rgba(0,0,0,0.08)'
            }}></div>
            <div style={{
              height: '32px',
              background: o.bottomColor,
              borderRadius: '2px 2px 6px 6px',
              border: '1px solid rgba(0,0,0,0.08)'
            }}></div>
          </div>

          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: '6px', marginBottom: '4px', flexWrap: 'wrap' }}>
              <span className="serif" style={{ fontSize: '11px', color: '#8a7e6c', fontWeight: 600 }}>
                #{String(o.num).padStart(2, '0')}
              </span>
              <span className="serif" style={{ fontSize: '14px', fontWeight: 600, color: '#1a1f3a' }}>
                {o.date}
              </span>
              <span style={{ fontSize: '11px', color: '#8a7e6c' }}>
                ({o.day})
              </span>
              {o.highlight && <span style={{ fontSize: '11px' }}>⭐</span>}
            </div>
            <div style={{ fontSize: '13px', color: '#2a2520', marginBottom: '3px', lineHeight: 1.4 }}>
              {o.desc}
            </div>
            <div style={{ fontSize: '11px', color: '#8a7e6c' }}>
              {o.note}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('schedule');

  return (
    <div style={styles.app}>
      <Header tab={tab} setTab={setTab} />
      <div>
        {tab === 'schedule' && <SchedulePage />}
        {tab === 'reservations' && <ReservationsPage />}
        {tab === 'outfits' && <OutfitsPage />}
      </div>
      <div style={{
        position: 'fixed',
        bottom: 0,
        left: 0,
        right: 0,
        padding: '12px',
        background: 'rgba(250, 248, 245, 0.95)',
        backdropFilter: 'blur(10px)',
        textAlign: 'center',
        fontSize: '10px',
        color: '#8a7e6c',
        letterSpacing: '1.5px',
        borderTop: '1px solid #efe9dd'
      }}>
        🤍 MAY 15 — JUNE 1, 2026 🤍
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
